<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Div_frame</title>
</head>
<body>
    <div style="background-image: url(images/vertical.png);
    background-repeat: repeat-y;
    background-position: left;
    width: 550px;">

        <div style="background-image: url(images/vertical.png);
    background-repeat: repeat-y;
    background-position: right;">

            <div style="background-image: url(images/horizon.png);
    background-repeat: repeat-x;
    background-position: top;">

                <div style="background-image: url(images/horizon.png);
    background-repeat: repeat-x;
    background-position: bottom;">

                    <div style="background-image: url(images/topLeft.png);
    background-repeat: no-repeat;
    background-position: top left;">

                        <div style="background-image: url(images/bottomLeft.png);
    background-repeat: no-repeat;
    background-position: bottom left;">

                           <div style="background-image: url(images/topRight.png);
    background-repeat: no-repeat;
    background-position: top right;">

                                <div style="background-image: url(images/bottomRight.png);
    background-repeat: no-repeat;
    background-position: bottom right;">
                                    <div style="text-align: center;
                                    font-size: 22px;
                                    padding: 45px;">
                                        Бериллий — элемент главной подгруппы второй группы, второго периода периодической системы химических элементов Д. И. Менделеева, с атомным номером 4. Обозначается символом Be (лат. Beryllium). Высокотоксичный элемент. Простое вещество бериллий &mdash; относительно твёрдый металл светло-серого цвета.
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
