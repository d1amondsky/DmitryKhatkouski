<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>with div style</title>
</head>
<body>
    <div style="
        width: 500px; height: 298px;
        
        background-image: 
        url(../withCSS/images/bottomRight.png),
        url(../withCSS/images/topRight.png),
        url(../withCSS/images/bottomLeft.png),
        url(../withCSS/images/topLeft.png),
        url(../withCSS/images/horizon.png),
        url(../withCSS/images/horizon.png),
        url(../withCSS/images/vertical.png),
        url(../withCSS/images/vertical.png);
        
        background-position:
        right bottom, right top, left bottom, left top, top, bottom, left, right;
        
        background-repeat: 
        no-repeat, no-repeat, no-repeat, no-repeat, repeat-x, repeat-x, repeat-y, repeat-y">
            <p style="font-size: 21px;
            text-align: center;
            padding: 45px;">
            Бериллий — элемент главной подгруппы второй группы, второго периода периодической системы химических элементов Д. И. Менделеева, с атомным номером 4. Обозначается символом Be (лат. Beryllium). Высокотоксичный элемент. Простое вещество бериллий — относительно твёрдый металл светло-серого цвета.
            </p>
    </div>
</body>
</html>
